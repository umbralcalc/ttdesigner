## Slow rust variant.
##
## Trains rust one generation later: 2-trains survive until the 5-train,
## 3-trains survive until the D-train, and 4-trains never rust. This extends
## the useful life of early purchases, giving smaller companies more runway
## before they face a mandatory train buy. Should reduce receivership rates
## and potentially increase game length.

